# Placement Constraints (standard cells, SRAMs)
#
# Source: hammer/src/hammer-vlsi/defaults.yml
# Valid orientations:
#   "r0", "r90", "r180", "r270", "mx", "mx90", "my", "my90"
# x, y in um; width, height in um (auto-fillable for hierarchical/hardmacro).
#
# This design uses 2-way set-associative caches with:
#   1x sram22_64x32m4w8   instance "Cache_Tag"        (metadata)
#   4x sram22_256x32m4w8  instances "Cache_Data_0..3" (data banks)
# per cache, instantiated inside  riscv_top/mem/icache  and  riscv_top/mem/dcache.

vlsi.inputs.placement_constraints:
  - path: "riscv_top"
    type: toplevel
    margins:
      left:   20
      right:  20
      top:    20
      bottom: 20
    x: 0
    y: 0
    width:  &FP_WIDTH 3000
    height: 3000

  # ICache (lower band)
  - path: "riscv_top/mem/icache/Cache_Tag"
    type: hardmacro
    x: 60
    y: 30
    orientation: "r0"
    top_layer: met3

  - path: "riscv_top/mem/icache/Cache_Data_0"
    type: hardmacro
    x: 250
    y: 30
    orientation: "r0"
    top_layer: met3

  - path: "riscv_top/mem/icache/Cache_Data_1"
    type: hardmacro
    x: 600
    y: 30
    orientation: "r0"
    top_layer: met3

  - path: "riscv_top/mem/icache/Cache_Data_2"
    type: hardmacro
    x: 950
    y: 30
    orientation: "r0"
    top_layer: met3

  - path: "riscv_top/mem/icache/Cache_Data_3"
    type: hardmacro
    x: 1300
    y: 30
    orientation: "r0"
    top_layer: met3

  # DCache (upper band, mirrored about x so pins face the digital region)
  - path: "riscv_top/mem/dcache/Cache_Tag"
    type: hardmacro
    x: 60
    y: 1700
    orientation: "mx"
    top_layer: met3

  - path: "riscv_top/mem/dcache/Cache_Data_0"
    type: hardmacro
    x: 250
    y: 1700
    orientation: "mx"
    top_layer: met3

  - path: "riscv_top/mem/dcache/Cache_Data_1"
    type: hardmacro
    x: 600
    y: 1700
    orientation: "mx"
    top_layer: met3

  - path: "riscv_top/mem/dcache/Cache_Data_2"
    type: hardmacro
    x: 950
    y: 1700
    orientation: "mx"
    top_layer: met3

  - path: "riscv_top/mem/dcache/Cache_Data_3"
    type: hardmacro
    x: 1300
    y: 1700
    orientation: "mx"
    top_layer: met3

  - path: "riscv_top/place_obs_bottom"
    type: obstruction
    obs_types: ["place"]
    x: 0
    y: 0
    width:  *FP_WIDTH
    height: 1.08

# Pin placement: pins on the bottom edge, met4
vlsi.inputs.pin_mode: generated
vlsi.inputs.pin.generate_mode: semi_auto
vlsi.inputs.pin.assignments: [
  {pins: "*", layers: ["met4"], side: "bottom"}
]

# Hammer auto-CPF for simple power designs
vlsi.inputs.power_spec_mode: "auto"
vlsi.inputs.power_spec_type: "cpf"

# Clock-Concurrent Optimization for CTS
par.innovus.use_cco: true

# Auto-floorplan exploration is OFF; keep manual constraints above
# par.innovus.floorplan_mode: auto

# SCL has no tapcells; disable Hammer's auto rail-generation
par.generate_power_straps_options.by_tracks.generate_rail_layer: false