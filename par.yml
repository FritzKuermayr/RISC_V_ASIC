# Placement Constraints (standard cells, SRAMs)
#
# Direct-mapped cache:
#   1x sram22_64x32m4w8   instance "Cache_Tag"        (metadata)
#   4x sram22_256x32m4w8  instances "Cache_Data_0..3" (data banks)
# per cache, instantiated inside  riscv_top/mem/icache  and  riscv_top/mem/dcache.

vlsi.inputs.placement_constraints:
  - path: "riscv_top"
    type: toplevel
    margins:
      left:   20
      right:  20
      top:    20
      bottom: 20
    x: 0
    y: 0
    width:  &FP_WIDTH 3000
    height: 3000

  # ICache
  - path: "riscv_top/mem/icache/Cache_Tag"
    type: hardmacro
    x: 60
    y: 30
    orientation: "r0"
    top_layer: met3

  - path: "riscv_top/mem/icache/Cache_Data_0"
    type: hardmacro
    x: 250
    y: 30
    orientation: "r0"
    top_layer: met3

  - path: "riscv_top/mem/icache/Cache_Data_1"
    type: hardmacro
    x: 600
    y: 30
    orientation: "r0"
    top_layer: met3

  - path: "riscv_top/mem/icache/Cache_Data_2"
    type: hardmacro
    x: 950
    y: 30
    orientation: "r0"
    top_layer: met3

  - path: "riscv_top/mem/icache/Cache_Data_3"
    type: hardmacro
    x: 1300
    y: 30
    orientation: "r0"
    top_layer: met3

  # DCache (mirrored)
  - path: "riscv_top/mem/dcache/Cache_Tag"
    type: hardmacro
    x: 60
    y: 1700
    orientation: "mx"
    top_layer: met3

  - path: "riscv_top/mem/dcache/Cache_Data_0"
    type: hardmacro
    x: 250
    y: 1700
    orientation: "mx"
    top_layer: met3

  - path: "riscv_top/mem/dcache/Cache_Data_1"
    type: hardmacro
    x: 600
    y: 1700
    orientation: "mx"
    top_layer: met3

  - path: "riscv_top/mem/dcache/Cache_Data_2"
    type: hardmacro
    x: 950
    y: 1700
    orientation: "mx"
    top_layer: met3

  - path: "riscv_top/mem/dcache/Cache_Data_3"
    type: hardmacro
    x: 1300
    y: 1700
    orientation: "mx"
    top_layer: met3

  - path: "riscv_top/place_obs_bottom"
    type: obstruction
    obs_types: ["place"]
    x: 0
    y: 0
    width:  *FP_WIDTH
    height: 1.08

vlsi.inputs.pin_mode: generated
vlsi.inputs.pin.generate_mode: semi_auto
vlsi.inputs.pin.assignments: [
  {pins: "*", layers: ["met4"], side: "bottom"}
]

vlsi.inputs.power_spec_mode: "auto"
vlsi.inputs.power_spec_type: "cpf"

par.innovus.use_cco: true

par.generate_power_straps_options.by_tracks.generate_rail_layer: false